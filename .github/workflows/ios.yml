name: iOS

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (iOS Simulator)
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Install XcodeGen and xcbeautify
        run: |
          brew install xcodegen xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Pick a simulator
        id: sim
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -E '^\s+iPhone (1[5-9]|2[0-9])( Pro)?\s' | head -1 | sed -E 's/^\s+(iPhone [0-9]+( Pro)?).*/\1/')
          if [ -z "$DEVICE" ]; then
            DEVICE="iPhone 16"
          fi
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"
          echo "Picked simulator: $DEVICE"

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project LifeZonesMap.xcodeproj \
            -scheme LifeZonesMap \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            build | xcbeautify

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild \
            -project LifeZonesMap.xcodeproj \
            -scheme LifeZonesMap \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            test | xcbeautify

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult-${{ github.run_id }}
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/Logs/**/*.xcresult
          retention-days: 7
