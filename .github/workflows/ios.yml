name: iOS

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

env:
  # Guaranteed available on macos-15 (Xcode 16.x); xcodebuild picks the
  # highest-iOS simulator that matches the deployment target.
  DESTINATION: "platform=iOS Simulator,name=iPhone 16"

jobs:
  build:
    name: Build & Test (iOS Simulator)
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Install XcodeGen + xcbeautify
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project LifeZonesMap.xcodeproj \
            -scheme LifeZonesMap \
            -configuration Debug \
            -destination "$DESTINATION" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            build | xcbeautify

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild \
            -project LifeZonesMap.xcodeproj \
            -scheme LifeZonesMap \
            -configuration Debug \
            -destination "$DESTINATION" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            test | xcbeautify

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult-${{ github.run_id }}
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/Logs/**/*.xcresult
          retention-days: 7
