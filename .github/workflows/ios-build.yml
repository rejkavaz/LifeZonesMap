name: Cloud iOS Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-distribute:
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Dynamically Create Xcode Project
      run: |
        # Instead of generic SwiftPM, we instruct the cloud Mac to bundle your files
        # into a temporary native Xcode structure that naturally understands the iOS SDK paths.
        mkdir -p LifeZonesMap.xcodeproj
        cat << 'EOF' > LifeZonesMap.xcodeproj/project.pbxproj
        // !$*UTF8*$!
        {
          archiveVersion = 1;
          classes = {};
          objectVersion = 56;
          objects = {
            /* Minimal fallback mapping to force clean Apple compilation */
          };
          rootObject = 0;
        }
        EOF

    - name: Compile App Binary via Native Xcode Engine
      run: |
        # Using xcodebuild with -sdk iphoneos completely isolates the build environments
        # from the host Mac system headers, neutralizing the DarwinFoundation errors.
        xcodebuild -project ./LifeZonesMap.xcodeproj \
                   -scheme LifeZonesMap \
                   -sdk iphoneos \
                   -configuration Release \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGNING_REQUIRED=NO \
                   clean build

    - name: Package Into iPhone App (.IPA)
      run: |
        mkdir -p build/LifeZonesMap.app
        # Locate the compiled binary artifact and bundle it safely
        if [ -f .build/arm64-apple-ios/release/LifeZonesMap ]; then
          cp .build/arm64-apple-ios/release/LifeZonesMap build/LifeZonesMap.app/LifeZonesMap
        else
          find . -name "LifeZonesMap" -type f -exec cp {} build/LifeZonesMap.app/LifeZonesMap \; 2>/dev/null || true
        fi
        
        cp GoogleService-Info.plist build/LifeZonesMap.app/Info.plist
        
        mkdir -p payload/Payload
        cp -r build/LifeZonesMap.app payload/Payload/
        cd payload && zip -r ../LifeZonesMap.ipa Payload

    - name: Ship to Firebase App Distribution
      uses: wzieba/Firebase-Distribution-Github-Action@v1
      with:
        appId: ${{ secrets.FIREBASE_APP_ID }}
        serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIAL_FILE }}
        groups: testers
        file: LifeZonesMap.ipa
