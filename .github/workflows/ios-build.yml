name: Cloud iOS Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-distribute:
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Preprocess Compilation Flags and Conflicts
      run: |
        # Comment out the Widget bundle main entry point so folder compiling focuses on the core app
        if [ -f LifeZonesWidget/LifeZonesWidget.swift ]; then
          sed -i '' 's/@main/\/\/ @main/' LifeZonesWidget/LifeZonesWidget.swift
        fi
        
        # Add @preconcurrency to the UserNotifications import to downgrade strict Sendable thread errors
        if [ -f LifeZonesMap/Services/NotificationScheduler.swift ]; then
          sed -i '' 's/import UserNotifications/@preconcurrency import UserNotifications/' LifeZonesMap/Services/NotificationScheduler.swift
        fi

    - name: Dynamically Generate Build Configuration
      run: |
        cat << 'EOF' > Package.swift
        // swift-tools-version: 6.0
        import PackageDescription

        let package = Package(
            name: "LifeZonesMap",
            platforms: [.iOS(.v17)],
            dependencies: [
                .package(url: "https://github.com/firebase/firebase-ios-sdk.git", from: "11.0.0")
            ],
            targets: [
                .executableTarget(
                    name: "LifeZonesMap",
                    dependencies: [
                        .product(name: "FirebaseCore", package: "firebase-ios-sdk")
                    ],
                    path: "LifeZonesMap"
                )
            ]
        )
        EOF

    - name: Compile App Binary (Simulator Architecture)
      run: |
        SDK_PATH=$(xcrun --sdk iphonesimulator --show-sdk-path)
        
        # Targets the simulator architecture so code signing is completely bypassed legally
        swift build -c release \
          --triple arm64-apple-ios-simulator \
          -Xswiftc -sdk -Xswiftc "$SDK_PATH" \
          -Xcc -isysroot -Xcc "$SDK_PATH" \
          -Xswiftc -strict-concurrency=minimal

    - name: Package Into Simulator App Bundle (.zip)
      run: |
        mkdir -p LifeZonesMap.app
        cp .build/arm64-apple-ios-simulator/release/LifeZonesMap LifeZonesMap.app/LifeZonesMap
        
        find . -name "GoogleService-Info.plist" -exec cp {} LifeZonesMap.app/Info.plist \; 2>/dev/null || true
        
        # Simulator builds are wrapped as zipped app packages rather than physical device IPAs
        zip -r LifeZonesMap.zip LifeZonesMap.app

    - name: Ship to Appetize Browser Simulator
      env:
        APPETIZE_TOKEN: ${{ secrets.APPETIZE_TOKEN }}
      run: |
        # Streams your built binary bundle right into your Appetize app dashboard
        curl https://$APPETIZE_TOKEN@api.appetize.io/v1/apps \
          -F "file=@LifeZonesMap.zip" \
          -F "platform=ios"
