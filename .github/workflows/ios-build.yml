name: Cloud iOS Build

on:
  push:
    branches: [ main ] # Triggers every time you push code to your repository

jobs:
  build-and-distribute:
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Dynamically Generate Build Configuration
      run: |
        # This writes a temporary compilation manifest directly on the cloud Mac 
        # so we don't have to change any of your repository files.
        cat << 'EOF' > Package.swift
        // swift-tools-version: 6.0
        import PackageDescription

        let package = Package(
            name: "LifeZonesMap",
            platforms: [.iOS(.v15)],
            dependencies: [
                .package(url: "https://github.com/firebase/firebase-ios-sdk.git", from: "11.0.0")
            ],
            targets: [
                .executableTarget(
                    name: "LifeZonesMap",
                    dependencies: [
                        .product(name: "FirebaseCore", package: "firebase-ios-sdk")
                    ],
                    path: "."
                )
            ]
        )
        EOF

    - name: Compile App Binary
      run: |
        # Compiles your raw Swift files for real iPhone processors (arm64)
        swift build -c release --triple arm64-apple-ios

    - name: Package Into iPhone App (.IPA)
      run: |
        # Creates the standard payload architecture an iPhone expects
        mkdir -p build/LifeZonesMap.app
        cp .build/arm64-apple-ios/release/LifeZonesMap build/LifeZonesMap.app/LifeZonesMap
        cp GoogleService-Info.plist build/LifeZonesMap.app/Info.plist
        
        # Compresses it into a clean, deployable iOS package
        mkdir -p payload/Payload
        cp -r build/LifeZonesMap.app payload/Payload/
        cd payload && zip -r ../LifeZonesMap.ipa Payload

    - name: Ship to Firebase App Distribution
      uses: wzieba/Firebase-Distribution-Github-Action@v1
      with:
        appId: ${{ secrets.FIREBASE_APP_ID }}
        serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIAL_FILE }}
        groups: testers
        file: LifeZonesMap.ipa
