name: Cloud iOS Build

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-distribute:
    runs-on: macos-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Preprocess Compilation Flags and Conflicts
      run: |
        # 1. Comment out the Widget bundle main entry point so folder compiling focuses on the core app
        if [ -f LifeZonesWidget/LifeZonesWidget.swift ]; then
          sed -i '' 's/@main/\/\/ @main/' LifeZonesWidget/LifeZonesWidget.swift
        fi
        
        # 2. Add @preconcurrency to the UserNotifications import to downgrade strict Sendable thread errors
        if [ -f LifeZonesMap/Services/NotificationScheduler.swift ]; then
          sed -i '' 's/import UserNotifications/@preconcurrency import UserNotifications/' LifeZonesMap/Services/NotificationScheduler.swift
        fi

    - name: Dynamically Generate Build Configuration
      run: |
        cat << 'EOF' > Package.swift
        // swift-tools-version: 6.0
        import PackageDescription

        let package = Package(
            name: "LifeZonesMap",
            platforms: [.iOS(.v17)],
            dependencies: [
                .package(url: "https://github.com/firebase/firebase-ios-sdk.git", from: "11.0.0")
            ],
            targets: [
                .executableTarget(
                    name: "LifeZonesMap",
                    dependencies: [
                        .product(name: "FirebaseCore", package: "firebase-ios-sdk")
                    ],
                    path: "LifeZonesMap"
                )
            ]
        )
        EOF

    - name: Compile App Binary
      run: |
        SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
        
        swift build -c release \
          --triple arm64-apple-ios \
          -Xswiftc -sdk -Xswiftc "$SDK_PATH" \
          -Xcc -isysroot -Xcc "$SDK_PATH" \
          -Xswiftc -strict-concurrency=minimal

    - name: Package Into iPhone App (.IPA)
      run: |
        mkdir -p build/LifeZonesMap.app
        cp .build/arm64-apple-ios/release/LifeZonesMap build/LifeZonesMap.app/LifeZonesMap
        
        # This scans all folders to grab your Google profile plist automatically 
        find . -name "GoogleService-Info.plist" -exec cp {} build/LifeZonesMap.app/Info.plist \;
        
        mkdir -p payload/Payload
        cp -r build/LifeZonesMap.app payload/Payload/
        cd payload && zip -r ../LifeZonesMap.ipa Payload

    - name: Ship to Firebase App Distribution
      uses: wzieba/Firebase-Distribution-Github-Action@v1
      with:
        appId: ${{ secrets.FIREBASE_APP_ID }}
        serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIAL_FILE }}
        groups: testers
        file: LifeZonesMap.ipa
