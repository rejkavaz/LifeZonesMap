name: IPA

on:
  push:
    branches: [master, main]
    tags: ['v*']
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'design/**'
      - '.github/workflows/preview.yml'
  workflow_dispatch:

permissions:
  contents: write   # for the optional Release upload

concurrency:
  group: ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build unsigned .ipa for sideloading
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for iOS device (arm64, unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project LifeZonesMap.xcodeproj \
            -scheme LifeZonesMap \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build

      - name: Verify build output
        id: build
        run: |
          APP="build/Build/Products/Release-iphoneos/LifeZonesMap.app"
          if [ ! -d "$APP" ]; then
            echo "::error::Expected .app not found at $APP"
            find build -name "*.app" -maxdepth 6 -print
            exit 1
          fi
          echo "app=$APP" >> "$GITHUB_OUTPUT"
          ls -la "$APP"

      - name: Strip any residual signature
        run: |
          APP="${{ steps.build.outputs.app }}"
          # Remove main bundle signature (codesign --remove-signature succeeds
          # whether or not one exists).
          codesign --remove-signature "$APP" 2>/dev/null || true
          # Strip the widget extension too.
          if [ -d "$APP/PlugIns/LifeZonesWidget.appex" ]; then
            codesign --remove-signature "$APP/PlugIns/LifeZonesWidget.appex" 2>/dev/null || true
          fi
          # Remove any embedded provisioning profile (free signers add their own)
          rm -f "$APP/embedded.mobileprovision"

      - name: Package into .ipa
        id: package
        run: |
          APP="${{ steps.build.outputs.app }}"
          STAGE="ipa-staging"
          rm -rf "$STAGE"
          mkdir -p "$STAGE/Payload"
          cp -R "$APP" "$STAGE/Payload/"
          # Tag the filename with short SHA + run number for traceability
          SHA=$(git rev-parse --short HEAD)
          OUT="LifeZonesMap-${SHA}-r${{ github.run_number }}.ipa"
          (cd "$STAGE" && zip -qr "../$OUT" Payload)
          ls -la "$OUT"
          echo "ipa=$OUT" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.ipa }}
          path: ${{ steps.package.outputs.ipa }}
          retention-days: 30

      - name: Publish to GitHub Release
        # Release on: a version tag push (v*), a push to master, or a manual run.
        if: >-
          startsWith(github.ref, 'refs/tags/v') ||
          (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
          github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tagged release — use the pushed tag and read its message as notes.
            TAG="${{ github.ref_name }}"
            TITLE="Life Zones $TAG"
          else
            # master / manual run — keep the rolling per-commit release.
            TAG="ipa-${{ steps.package.outputs.sha }}"
            TITLE="Unsigned .ipa @ ${{ steps.package.outputs.sha }}"
          fi
          NOTES="Unsigned build at \`${{ steps.package.outputs.sha }}\` (run #${{ github.run_number }}).

          Drop the attached \`.ipa\` into Sideloadly to sign with your Apple ID and install on your iPhone. See the README for details."

          # Create the release if it doesn't exist yet; otherwise just (re)upload the asset.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${{ steps.package.outputs.ipa }}" --clobber
          else
            gh release create "$TAG" \
              "${{ steps.package.outputs.ipa }}" \
              --title "$TITLE" \
              --notes "$NOTES" \
              --target "${{ github.sha }}"
          fi
