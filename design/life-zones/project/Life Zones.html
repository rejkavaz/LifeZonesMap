<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Life Zones · Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #efe9d9; font-family: 'Inter', system-ui, sans-serif; }
  /* Custom scrollbar visible in dc-card overrides */
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="phone.jsx"></script>
<script type="text/babel" src="identity.jsx"></script>
<script type="text/babel" src="map-screen.jsx"></script>
<script type="text/babel" src="checkin-screen.jsx"></script>
<script type="text/babel" src="pulse-screen.jsx"></script>
<script type="text/babel" src="onboarding.jsx"></script>
<script type="text/babel" src="widgets.jsx"></script>
<script type="text/babel" src="wireframes.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  return (
    <DesignCanvas>
      <DCSection id="wireframes" title="Wireframes" subtitle="Pencil-on-paper structure for the four pillar screens.">
        <DCArtboard id="wires" label="Pencil sketches · 4 screens" width={1180} height={920}>
          <WireframesBoard/>
        </DCArtboard>
      </DCSection>

      <DCSection id="identity" title="Visual Identity" subtitle="The mark, the wordmark, the palette, the wallpapers.">
        <DCArtboard id="identity-sheet" label="Field Guide 001 · Identity sheet" width={1180} height={2680}>
          <IdentitySheet/>
        </DCArtboard>
      </DCSection>

      <DCSection id="hi-fi-screens" title="The Three Tabs" subtitle="Map · Check-In · Pulse — iPhone 15 Pro frames.">
        <DCArtboard id="map" label="Map · the weekly radar" width={430} height={920}>
          <div style={{ padding: 18 }}><MapScreen/></div>
        </DCArtboard>
        <DCArtboard id="checkin" label="Check-In · the ritual" width={430} height={920}>
          <div style={{ padding: 18 }}><CheckInScreen/></div>
        </DCArtboard>
        <DCArtboard id="pulse" label="Pulse · monthly report" width={430} height={920}>
          <div style={{ padding: 18 }}><PulseScreen/></div>
        </DCArtboard>
      </DCSection>

      <DCSection id="onboarding" title="Onboarding" subtitle="Four screens. Two lines of copy each. One button.">
        <DCArtboard id="ob1" label="01 · Welcome" width={430} height={920}>
          <div style={{ padding: 18 }}><OnboardWelcome/></div>
        </DCArtboard>
        <DCArtboard id="ob2" label="02 · Zones" width={430} height={920}>
          <div style={{ padding: 18 }}><OnboardZones/></div>
        </DCArtboard>
        <DCArtboard id="ob3" label="03 · Schedule" width={430} height={920}>
          <div style={{ padding: 18 }}><OnboardSchedule/></div>
        </DCArtboard>
        <DCArtboard id="ob4" label="04 · First check-in" width={430} height={920}>
          <div style={{ padding: 18 }}><OnboardFirstCheckin/></div>
        </DCArtboard>
      </DCSection>

      <DCSection id="widgets" title="Widgets" subtitle="Small, medium, and lock screen.">
        <DCArtboard id="widgets-board" label="Three widget variants" width={1180} height={780}>
          <WidgetsBoard/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
